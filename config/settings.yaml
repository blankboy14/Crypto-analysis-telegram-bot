# settings.yaml
# Central config for the bot. Secrets (bot token, API keys) live in
# .env instead - this file is for tunable numbers/behaviour only, and
# is safe to commit to git.

analysis:
  min_ticks_before_analysis: 5
  max_history_per_symbol: 300

indicators:
  rsi:
    period: 14
    overbought: 70
    oversold: 30
  ema:
    fast_period: 9
    slow_period: 21
  macd:
    fast_period: 12
    slow_period: 26
    signal_period: 9
  bollinger:
    period: 20
    num_std: 2
  support_resistance:
    lookback: 50

risk_management:
  stop_loss_pct_of_range: 0.30
  take_profit_pct_of_range: 0.60
  fallback_range_pct: 0.01

signal_scoring:
  buy_threshold: 2
  sell_threshold: -2

# --- Phase 2.1: "24/7 Market Analyse" volume-spike watcher ---
volume_spike_watch:
  poll_interval_seconds: 15
  # % move within one poll window that counts as "suddenly moving" for
  # a normal pair (per the spec: e.g. 20-40% in a short burst).
  spike_pct_threshold: 20.0
  # BTC gets a separate, much tighter threshold since the spec calls
  # out that BTC essentially never does 20-40% moves - a smaller move
  # is already noteworthy for it.
  btc_spike_pct_threshold: 5.0
  btc_symbol: "BTCUSDT"
  # Don't re-alert the same pair/direction again within this window.
  cooldown_seconds: 900
  # --- volume burst add-on (real traded volume, not price) ---
  # A pair's traded volume this interval must be at least this many
  # times its own recent baseline to count as a "burst".
  volume_burst_multiplier: 5.0
  # Need at least this many prior interval samples before a baseline
  # is trusted enough to compare against (avoids flagging on noise
  # while a pair is still "warming up").
  volume_burst_min_samples: 5
  # If > 0, only alert bursts where the pair's baseline interval
  # volume was at/below this (USDT) - i.e. it really was quiet before.
  # 0 disables the filter and considers every pair regardless of size.
  volume_burst_low_floor_usdt: 0

# --- Phase 2.2: "Find Strong Signal" 24/7 scanner ---
strong_signal_watch:
  # How often to re-run a full market scan while this mode is ON.
  scan_interval_seconds: 900
  # Only push a signal to the user once its confidence is at/above this.
  min_confidence_to_push: 80
  worker_count: 8
  # Don't push the exact same pair+verdict again within this window.
  cooldown_seconds: 3600
  # --- pump/reversal SELL-bias add-on ---
  # How far back (in daily snapshots) to look when judging a
  # "cumulative" pump - a single 24h ticker figure can't see a move
  # that built up over several days.
  pump_window_days: 5
  # Trailing cumulative % gain that marks a pair as overextended and
  # worth watching for a reversal (per the spec: 80-100%+ pumps).
  pump_threshold_pct: 80.0
  # How often to re-check flagged pairs for a reversal - cheap (token
  # list + occasional order-flow calls only), so this can run much
  # more often than a full scan.
  pump_check_interval_seconds: 60
  # % drop from the peak price (since being flagged) that counts as
  # "starting to reverse".
  reversal_drop_pct: 15.0
  # Live order flow's sell-side % must be at/above this to CONFIRM a
  # reversal once the price drop threshold is hit (if order flow is
  # unavailable, the price drop alone is treated as sufficient).
  reversal_sell_flow_pct: 55.0

# --- Phase 2.3: "Search Signal" one-shot scan ---
search_signal:
  worker_count: 8
  top_n: 3

symbols:
  watchlist:
    - "BTCUSDT"
    - "ETHUSDT"

logging:
  level: "INFO"
  log_to_file: true
  log_file_path: "logs/bot_log.txt"